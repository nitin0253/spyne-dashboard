<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spyne Costing Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg:    #0d0f14;
    --card:  #151820;
    --border:#1e2330;
    --text:  #e2e8f0;
    --muted: #64748b;
    --blue:  #3b82f6;
    --green: #22c55e;
    --amber: #f59e0b;
    --red:   #ef4444;
    --purple:#a855f7;
    --cyan:  #06b6d4;
    --indigo:#6366f1;
    --teal:  #14b8a6;
    --font:  'Inter', system-ui, sans-serif;
    --r:     10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; min-height: 100vh; }
  a { color: var(--blue); text-decoration: none; }

  /* ── Layout ── */
  #app { display: flex; min-height: 100vh; }
  #sidebar {
    width: 220px; min-height: 100vh; background: var(--card);
    border-right: 1px solid var(--border); padding: 0; flex-shrink: 0;
    display: flex; flex-direction: column;
  }
  #main { flex: 1; overflow-x: hidden; }

  /* ── Sidebar ── */
  .sb-logo {
    padding: 20px 20px 16px;
    font-size: 16px; font-weight: 700; letter-spacing: -0.3px; color: var(--text);
    border-bottom: 1px solid var(--border);
  }
  .sb-logo span { color: var(--blue); }
  .sb-section { padding: 12px 10px 4px; font-size: 10px; text-transform: uppercase;
    letter-spacing: 1px; color: var(--muted); font-weight: 600; }
  .sb-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 16px; cursor: pointer; border-radius: 6px;
    margin: 2px 8px; font-size: 13px; color: var(--muted); transition: all .15s;
  }
  .sb-item:hover { background: rgba(255,255,255,.05); color: var(--text); }
  .sb-item.active { background: rgba(59,130,246,.15); color: var(--blue); font-weight: 500; }
  .sb-item svg { width: 16px; height: 16px; flex-shrink: 0; }
  .sb-footer { margin-top: auto; padding: 14px 16px; border-top: 1px solid var(--border); font-size: 11px; color: var(--muted); }

  /* ── Topbar ── */
  #topbar {
    height: 56px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; background: var(--card); position: sticky; top: 0; z-index: 10;
  }
  #topbar h1 { font-size: 15px; font-weight: 600; }
  .filters { display: flex; gap: 10px; align-items: center; }
  .filters select, .filters button {
    background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer;
    font-family: var(--font);
  }
  .filters select:focus, .filters button:focus { outline: none; border-color: var(--blue); }
  #refresh-btn { color: var(--blue); border-color: var(--blue); }
  #refresh-btn:hover { background: rgba(59,130,246,.1); }

  /* ── Page content ── */
  #page { padding: 24px; }

  /* ── KPI cards ── */
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; margin-bottom: 24px; }
  .kpi {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--r);
    padding: 18px 20px;
  }
  .kpi-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
  .kpi-val { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
  .kpi-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .kpi.blue  .kpi-val { color: var(--blue); }
  .kpi.green .kpi-val { color: var(--green); }
  .kpi.amber .kpi-val { color: var(--amber); }
  .kpi.red   .kpi-val { color: var(--red); }
  .kpi.purple.kpi-val { color: var(--purple); }
  .kpi.cyan  .kpi-val { color: var(--cyan); }

  /* ── Cards ── */
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--r);
    padding: 20px; margin-bottom: 18px;
  }
  .card-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .card-title span { font-size: 11px; color: var(--muted); font-weight: 400; }

  /* ── Charts ── */
  .chart-wrap { position: relative; }
  .chart-wrap canvas { max-width: 100%; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; }
  @media (max-width: 900px) { .two-col, .three-col { grid-template-columns: 1fr; } }

  /* ── Tables ── */
  .tbl-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    background: rgba(255,255,255,.04); padding: 10px 12px;
    text-align: left; font-size: 11px; font-weight: 600;
    color: var(--muted); border-bottom: 1px solid var(--border);
    white-space: nowrap; text-transform: uppercase; letter-spacing: .4px;
  }
  thead th.r, td.r { text-align: right; }
  thead th.c, td.c { text-align: center; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
  tbody tr:hover { background: rgba(255,255,255,.03); }
  tbody td { padding: 10px 12px; color: var(--text); white-space: nowrap; }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500;
  }
  .badge-ent    { background: rgba(99,102,241,.2); color: var(--indigo); }
  .badge-mid    { background: rgba(59,130,246,.2); color: var(--blue); }
  .badge-smb    { background: rgba(34,197,94,.2);  color: var(--green); }
  .badge-res    { background: rgba(245,158,11,.2); color: var(--amber); }
  .badge-unk    { background: rgba(100,116,139,.2);color: var(--muted); }

  /* ── Tabs ── */
  .tab-bar { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
  .tab {
    padding: 8px 16px; cursor: pointer; font-size: 13px; color: var(--muted);
    border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--blue); border-bottom-color: var(--blue); font-weight: 500; }

  /* ── Loading / Error ── */
  #loader {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center; z-index: 100;
    flex-direction: column; gap: 16px;
  }
  .spinner {
    width: 40px; height: 40px; border: 3px solid var(--border);
    border-top-color: var(--blue); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loader-text { color: var(--muted); font-size: 13px; }

  #error-box {
    display: none; max-width: 520px; margin: 60px auto;
    background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.3);
    border-radius: var(--r); padding: 28px; text-align: center;
  }
  #error-box h2 { color: var(--red); margin-bottom: 12px; }
  #error-box pre { font-size: 11px; color: var(--muted); background: var(--card); padding: 12px; border-radius: 6px; text-align: left; white-space: pre-wrap; margin: 12px 0; }
  .retry-btn {
    background: var(--red); color: #fff; border: none; padding: 8px 20px;
    border-radius: 6px; cursor: pointer; font-family: var(--font); font-size: 13px;
  }

  /* ── Misc ── */
  .pill {
    display: inline-flex; align-items: center; gap: 4px;
    background: rgba(255,255,255,.06); border-radius: 20px;
    padding: 3px 10px; font-size: 11px; color: var(--muted);
  }
  .trend-up   { color: var(--green); font-size: 11px; }
  .trend-down { color: var(--red);   font-size: 11px; }
  .sort-icon  { font-size: 10px; color: var(--blue); margin-left: 2px; }
  thead th[data-sort] { cursor: pointer; user-select: none; }
  thead th[data-sort]:hover { color: var(--text); }
</style>
</head>
<body>

<!-- ── Loading overlay ── -->
<div id="loader">
  <div class="spinner"></div>
  <div class="loader-text">Loading dashboard data…</div>
</div>

<div id="app" style="display:none">
  <!-- ── Sidebar ── -->
  <nav id="sidebar">
    <div class="sb-logo">Spyne <span>Costs</span></div>
    <div class="sb-section">Reports</div>
    <div class="sb-item active" data-view="overview" onclick="switchView('overview')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Overview
    </div>
    <div class="sb-item" data-view="costing" onclick="switchView('costing')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      Costing
    </div>
    <div class="sb-item" data-view="product" onclick="switchView('product')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Product
    </div>
    <div class="sb-item" data-view="enterprise" onclick="switchView('enterprise')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Enterprise
    </div>
    <div class="sb-item" data-view="editor" onclick="switchView('editor')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      QC Editors
    </div>
    <div class="sb-footer" id="last-updated">—</div>
  </nav>

  <!-- ── Main ── -->
  <div id="main">
    <div id="topbar">
      <h1 id="page-title">Overview</h1>
      <div class="filters">
        <select id="month-filter" onchange="onFilterChange()">
          <option value="all">All Months</option>
        </select>
        <button id="refresh-btn" onclick="loadData(true)">↻ Refresh</button>
      </div>
    </div>
    <div id="page"></div>
  </div>
</div>

<!-- ── Error box ── -->
<div id="error-box">
  <h2>Failed to load data</h2>
  <pre id="error-msg"></pre>
  <p style="font-size:12px;color:var(--muted);margin-bottom:14px">
    1. Check GOOGLE_SERVICE_ACCOUNT_EMAIL + GOOGLE_PRIVATE_KEY in Vercel<br>
    2. Share sheets with service account (Viewer)<br>
    3. Redeploy after env var changes
  </p>
  <button class="retry-btn" onclick="loadData(true)">Retry</button>
</div>

<script>
'use strict';

// ══════════════════════════════════════════════════════════════
// DATA STORE
// ══════════════════════════════════════════════════════════════
let DATA = null;                 // full API payload
let ENT_META = {};               // keyed by originalName.toLowerCase()
let ENT_META_NORM = {};          // normalized → originalName key
let CURRENT_VIEW = 'overview';
let _charts = [];                // track Chart.js instances for destroy

// ══════════════════════════════════════════════════════════════
// FORMATTERS
// ══════════════════════════════════════════════════════════════
const f = {
  inr: v => {
    v = +v || 0;
    if (Math.abs(v) >= 1e7) return '₹' + (v / 1e7).toFixed(2) + ' Cr';
    if (Math.abs(v) >= 1e5) return '₹' + (v / 1e5).toFixed(1) + ' L';
    if (Math.abs(v) >= 1e3) return '₹' + (v / 1e3).toFixed(1) + 'K';
    return '₹' + v.toFixed(2);
  },
  inr0: v => {
    v = +v || 0;
    if (Math.abs(v) >= 1e7) return '₹' + (v / 1e7).toFixed(2) + ' Cr';
    if (Math.abs(v) >= 1e5) return '₹' + (v / 1e5).toFixed(1) + ' L';
    if (Math.abs(v) >= 1e3) return '₹' + (v / 1e3).toFixed(0) + 'K';
    return '₹' + Math.round(v);
  },
  num: v => {
    v = +v || 0;
    if (Math.abs(v) >= 1e6) return (v / 1e6).toFixed(1) + 'M';
    if (Math.abs(v) >= 1e3) return (v / 1e3).toFixed(1) + 'K';
    return Math.round(v).toLocaleString();
  },
  pct: v => (+v || 0).toFixed(1) + '%',
  eff: v => (+v || 0).toFixed(2) + 'x',
};

// ══════════════════════════════════════════════════════════════
// ENT META HELPERS
// ══════════════════════════════════════════════════════════════
function applyEntMeta(rawMeta) {
  ENT_META = {};
  ENT_META_NORM = {};
  if (!rawMeta) return;
  // rawMeta may be keyed by lowercase already (from data.js) or by originalName
  Object.values(rawMeta).forEach(function(e) {
    if (!e || !e.originalName) return;
    const origKey = e.originalName;
    const normKey = origKey.toLowerCase().trim();
    ENT_META[normKey]      = e;
    ENT_META_NORM[normKey] = normKey;
  });
  // Also iterate keys in case values don't have originalName
  Object.entries(rawMeta).forEach(function([k, v]) {
    if (!v) return;
    const normKey = k.toLowerCase().trim();
    if (!ENT_META[normKey]) {
      ENT_META[normKey] = { originalName: v.originalName || k, ...v };
      ENT_META_NORM[normKey] = normKey;
    }
  });
}

function entMeta(name) {
  if (!name) return {};
  const k = name.toLowerCase().trim();
  return ENT_META[k] || {};
}

function segBadge(seg) {
  seg = (seg || 'Unknown').toLowerCase();
  if (seg.includes('enterprise') || seg === 'ent') return '<span class="badge badge-ent">Enterprise</span>';
  if (seg.includes('mid'))    return '<span class="badge badge-mid">Mid</span>';
  if (seg.includes('smb'))    return '<span class="badge badge-smb">SMB</span>';
  if (seg.includes('resell')) return '<span class="badge badge-res">Reseller</span>';
  return '<span class="badge badge-unk">' + (seg || '—') + '</span>';
}

// ══════════════════════════════════════════════════════════════
// FILTER HELPERS
// ══════════════════════════════════════════════════════════════
function filteredMonths() {
  if (!DATA) return [];
  const sel = document.getElementById('month-filter').value;
  if (sel === 'all') return DATA.months;
  return DATA.months.filter(m => m.key === sel);
}

function mergeMonths(months) {
  // Merge multiple month objects into one combined object
  if (!months.length) return null;
  if (months.length === 1) return months[0];

  const merged = {
    totalImages: 0, totalSKUs: 0, totalVINs: 0,
    totalTarget: 0, totalActual: 0,
    totalCost: 0, totalUnits: 0, headcount: 0,
  };

  const productMap = {}, editorMap = {}, enterpriseMap = {}, segmentMap = {};

  for (const m of months) {
    merged.totalImages  += m.totalImages  || 0;
    merged.totalSKUs    += m.totalSKUs    || 0;
    merged.totalVINs    += m.totalVINs    || 0;
    merged.totalTarget  += m.totalTarget  || 0;
    merged.totalActual  += m.totalActual  || 0;
    merged.totalCost    += m.totalCost    || 0;
    merged.totalUnits   += m.totalUnits   || 0;
    merged.headcount    = Math.max(merged.headcount, m.headcount || 0);

    for (const p of (m.products || [])) {
      if (!productMap[p.product]) productMap[p.product] = { ...p, totalCost: 0 };
      else {
        productMap[p.product].images += p.images || 0;
        productMap[p.product].skus   += p.skus   || 0;
        productMap[p.product].vins   += p.vins   || 0;
        productMap[p.product].units  += p.units  || 0;
        productMap[p.product].target += p.target || 0;
        productMap[p.product].actual += p.actual || 0;
        productMap[p.product].rows   += p.rows   || 0;
      }
    }

    for (const e of (m.editors || [])) {
      if (!editorMap[e.editor]) editorMap[e.editor] = { ...e };
      else {
        editorMap[e.editor].images  += e.images  || 0;
        editorMap[e.editor].units   += e.units   || 0;
        editorMap[e.editor].target  += e.target  || 0;
        editorMap[e.editor].actual  += e.actual  || 0;
        editorMap[e.editor].factorSalary = Math.max(editorMap[e.editor].factorSalary, e.factorSalary || 0);
      }
    }

    for (const e of (m.enterprises || [])) {
      const k = e.enterprise.toLowerCase();
      if (!enterpriseMap[k]) enterpriseMap[k] = { ...e, totalCost: e.totalCost || 0 };
      else {
        enterpriseMap[k].images    += e.images    || 0;
        enterpriseMap[k].skus      += e.skus      || 0;
        enterpriseMap[k].vins      += e.vins      || 0;
        enterpriseMap[k].units     += e.units     || 0;
        enterpriseMap[k].totalCost += e.totalCost || 0;
      }
    }

    for (const s of (m.segments || [])) {
      if (!segmentMap[s.seg]) segmentMap[s.seg] = { ...s };
      else {
        segmentMap[s.seg].units     += s.units     || 0;
        segmentMap[s.seg].totalCost += s.totalCost || 0;
      }
    }
  }

  // Re-compute derived
  merged.costPerUnit = merged.totalUnits > 0 ? merged.totalCost / merged.totalUnits : 0;
  merged.efficiency  = merged.totalTarget > 0 ? merged.totalTarget / (merged.totalActual || merged.totalTarget) : 0;

  // Enrich editors
  merged.editors = Object.values(editorMap).map(e => ({
    ...e,
    efficiency:  e.target > 0 ? e.target / (e.actual || e.target) : 0,
    costPerUnit: e.units  > 0 ? e.factorSalary / e.units : 0,
  })).sort((a, b) => b.units - a.units);

  // Enrich enterprises
  merged.enterprises = Object.values(enterpriseMap).map(e => {
    if (!e.totalCost && e.units && merged.costPerUnit) {
      e.totalCost = Math.round(merged.costPerUnit * e.units);
    }
    e.costPerUnit = e.units > 0 ? e.totalCost / e.units : 0;
    return e;
  }).sort((a, b) => b.costPerUnit - a.costPerUnit).slice(0, 30);

  merged.products  = Object.values(productMap);
  merged.segments  = Object.values(segmentMap).map(s => ({
    ...s,
    pct: merged.totalUnits > 0 ? Math.round(s.units / merged.totalUnits * 100) : 0,
  }));

  return merged;
}

// ══════════════════════════════════════════════════════════════
// CHART HELPERS
// ══════════════════════════════════════════════════════════════
const COLORS = ['#3b82f6','#22c55e','#f59e0b','#a855f7','#06b6d4','#ef4444','#6366f1','#14b8a6','#f97316','#ec4899'];

function mkChart(id, type, labels, datasets, opts) {
  const el = document.getElementById(id);
  if (!el) return;
  // Destroy existing
  const existing = Chart.getChart(el);
  if (existing) existing.destroy();

  const defaultOpts = {
    responsive: true, maintainAspectRatio: false,
    plugins: {
      legend: { labels: { color: '#94a3b8', font: { size: 11 }, boxWidth: 12 } },
      tooltip: {
        backgroundColor: '#1e2330', borderColor: '#2d3448', borderWidth: 1,
        titleColor: '#e2e8f0', bodyColor: '#94a3b8', padding: 10,
      },
    },
    scales: type !== 'pie' && type !== 'doughnut' ? {
      x: { grid: { color: 'rgba(255,255,255,.05)' }, ticks: { color: '#64748b', font: { size: 11 } } },
      y: { grid: { color: 'rgba(255,255,255,.05)' }, ticks: { color: '#64748b', font: { size: 11 } } },
    } : {},
  };

  new Chart(el, {
    type,
    data: { labels, datasets },
    options: Object.assign({}, defaultOpts, opts || {}),
  });
}

// ══════════════════════════════════════════════════════════════
// SORT HELPER
// ══════════════════════════════════════════════════════════════
let _tableSorts = {};
function sortTable(tblId, col, type) {
  const tbl = document.getElementById(tblId);
  if (!tbl) return;
  const s = _tableSorts[tblId] || { col: null, dir: 1 };
  if (s.col === col) s.dir *= -1; else { s.col = col; s.dir = -1; }
  _tableSorts[tblId] = s;

  const tbody = tbl.querySelector('tbody');
  const rows  = Array.from(tbody.querySelectorAll('tr'));
  rows.sort((a, b) => {
    const av = a.dataset[col] || '';
    const bv = b.dataset[col] || '';
    if (type === 'num') return s.dir * ((+av || 0) - (+bv || 0));
    return s.dir * av.localeCompare(bv);
  });

  // Update header indicators
  tbl.querySelectorAll('thead th').forEach(th => {
    th.querySelector('.sort-icon') && (th.querySelector('.sort-icon').textContent = '');
  });
  const th = tbl.querySelector(`thead th[data-col="${col}"]`);
  if (th && th.querySelector('.sort-icon')) {
    th.querySelector('.sort-icon').textContent = s.dir === -1 ? ' ▼' : ' ▲';
  }

  tbody.innerHTML = '';
  rows.forEach(r => tbody.appendChild(r));
}

// ══════════════════════════════════════════════════════════════
// VIEW: OVERVIEW
// ══════════════════════════════════════════════════════════════
function renderOverview() {
  const months  = filteredMonths();
  const merged  = mergeMonths(months);
  if (!merged) { document.getElementById('page').innerHTML = '<div style="padding:40px;color:var(--muted)">No data available</div>'; return; }

  const labels  = DATA.months.map(m => m.month);
  const costs   = DATA.months.map(m => m.totalCost);
  const units   = DATA.months.map(m => m.totalUnits);
  const cpus    = DATA.months.map(m => m.costPerUnit);
  const effs    = DATA.months.map(m => m.efficiency);

  document.getElementById('page').innerHTML = `
    <div style="padding:24px">
      <div class="kpi-grid">
        <div class="kpi blue">

// ══════════════════════════════════════════════════════════════
// VIEW: COSTING
// ══════════════════════════════════════════════════════════════
function renderCosting() {
  const months = filteredMonths();
  const merged = mergeMonths(months);
  if (!merged) return;

  const segs   = merged.segments || [];
  const segLabels = segs.map(s => s.seg || 'Unknown');
  const segCosts  = segs.map(s => s.totalCost || 0);
  const segUnits  = segs.map(s => s.units || 0);

  // Month-on-month cost table
  const momRows = DATA.months.map((m, i) => {
    const prev = i > 0 ? DATA.months[i - 1] : null;
    const diff = prev ? m.totalCost - prev.totalCost : null;
    const pct  = prev && prev.totalCost > 0 ? (diff / prev.totalCost * 100) : null;
    return `<tr>
      <td>${m.month}</td>
      <td class="r">${f.inr0(m.totalCost)}</td>
      <td class="r">${f.inr(m.costPerUnit)}</td>
      <td class="r">${f.num(m.totalUnits)}</td>
      <td class="r">${m.headcount || '—'}</td>
      <td class="r">${diff !== null
        ? `<span class="${diff >= 0 ? 'trend-up' : 'trend-down'}">${diff >= 0 ? '+' : ''}${f.inr0(diff)} (${pct !== null ? pct.toFixed(1) : '—'}%)</span>`
        : '—'}</td>
    </tr>`;
  }).join('');

  document.getElementById('page').innerHTML = `
    <div style="padding:24px">
      <div class="kpi-grid">
        <div class="kpi blue">
          <div class="kpi-label">Total Cost</div>
          <div class="kpi-val">${f.inr0(merged.totalCost)}</div>
          <div class="kpi-sub">${months.length} month(s)</div>
        </div>
        <div class="kpi amber">
          <div class="kpi-label">Cost / Unit</div>
          <div class="kpi-val">${f.inr(merged.costPerUnit)}</div>
        </div>
        <div class="kpi green">
          <div class="kpi-label">Total Units</div>
          <div class="kpi-val">${f.num(merged.totalUnits)}</div>
        </div>
        <div class="kpi purple">
          <div class="kpi-label">Headcount</div>
          <div class="kpi-val" style="color:var(--purple)">${merged.headcount}</div>
        </div>
      </div>

      <div class="two-col">
        <div class="card">
          <div class="card-title">Cost by Segment</div>
          <div class="chart-wrap" style="height:240px">
            <canvas id="ch-seg-cost"></canvas>
          </div>
        </div>
        <div class="card">
          <div class="card-title">Units by Segment</div>
          <div class="chart-wrap" style="height:240px">
            <canvas id="ch-seg-units"></canvas>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Month-on-Month Summary</div>
        <div class="tbl-wrap">
          <table>
            <thead><tr>
              <th>Month</th>
              <th class="r">Total Cost</th>
              <th class="r">Cost/Unit</th>
              <th class="r">Units</th>
              <th class="r">Headcount</th>
              <th class="r">MoM Change</th>
            </tr></thead>
            <tbody>${momRows}</tbody>
          </table>
        </div>
      </div>
    </div>`;

  if (segCosts.some(v => v > 0)) {
    mkChart('ch-seg-cost', 'doughnut', segLabels, [{
      data: segCosts, backgroundColor: COLORS, borderWidth: 0,
    }], { cutout: '60%' });
    mkChart('ch-seg-units', 'doughnut', segLabels, [{
      data: segUnits, backgroundColor: COLORS, borderWidth: 0,
    }], { cutout: '60%' });
  } else {
    document.getElementById('ch-seg-cost').parentElement.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:20px">No segment data — enterprise_details sheet may be empty or not shared</div>';
    document.getElementById('ch-seg-units') && (document.getElementById('ch-seg-units').parentElement.innerHTML = '');
  }
}

// VIEW: PRODUCT
// ══════════════════════════════════════════════════════════════
function renderProduct() {
  const months = filteredMonths();
  const merged = mergeMonths(months);
  if (!merged) return;

  const prods = (merged.products || []).sort((a, b) => b.units - a.units);
  const pLabels = prods.map(p => p.product);
  const pUnits  = prods.map(p => p.units);
  const pCosts  = prods.map(p => p.totalCost || 0);

  const tableRows = prods.map((p, i) => `
    <tr>
      <td>${p.product || '—'}</td>
      <td class="r">${f.num(p.images)}</td>
      <td class="r">${f.num(p.skus)}</td>
      <td class="r">${f.num(p.vins)}</td>
      <td class="r">${f.num(p.units)}</td>
      <td class="r">${f.eff(p.efficiency)}</td>
      <td class="r" style="color:var(--amber)">${f.inr0(p.totalCost)}</td>
    </tr>`).join('');

  // Cross-month trend per product (top 4)
  const top4 = prods.slice(0, 4).map(p => p.product);
  const mLabels = DATA.months.map(m => m.month);
  const trendDatasets = top4.map((prod, i) => ({
    label: prod,
    data: DATA.months.map(m => {
      const mp = (m.products || []).find(p => p.product === prod);
      return mp ? mp.units : 0;
    }),
    borderColor: COLORS[i], backgroundColor: COLORS[i] + '22',
    tension: 0.4, fill: false, pointRadius: 3,
  }));

  document.getElementById('page').innerHTML = `
    <div style="padding:24px">
      <div class="two-col">
        <div class="card">
          <div class="card-title">Units by Product</div>
          <div class="chart-wrap" style="height:220px">
            <canvas id="ch-prod-units"></canvas>
          </div>
        </div>
        <div class="card">
          <div class="card-title">Cost by Product</div>
          <div class="chart-wrap" style="height:220px">
            <canvas id="ch-prod-cost"></canvas>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Product Trend (Top 4) <span>units/month</span></div>
        <div class="chart-wrap" style="height:220px">
          <canvas id="ch-prod-trend"></canvas>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Product Breakdown</div>
        <div class="tbl-wrap">
          <table>
            <thead><tr>
              <th>Product</th>
              <th class="r">Images</th>
              <th class="r">SKUs</th>
              <th class="r">VINs</th>
              <th class="r">Billing Units</th>
              <th class="r">Efficiency</th>
              <th class="r">Delivery Cost</th>
            </tr></thead>
            <tbody>${tableRows}</tbody>
          </table>
        </div>
      </div>
    </div>`;

  mkChart('ch-prod-units', 'bar', pLabels, [{
    label: 'Units', data: pUnits, backgroundColor: COLORS,
  }], { plugins: { legend: { display: false } }, indexAxis: 'y' });

  mkChart('ch-prod-cost', 'bar', pLabels, [{
    label: 'Cost', data: pCosts, backgroundColor: COLORS.map(c => c + 'aa'),
    borderColor: COLORS, borderWidth: 1,
  }], { plugins: { legend: { display: false } }, indexAxis: 'y' });

  if (trendDatasets.length) {
    mkChart('ch-prod-trend', 'line', mLabels, trendDatasets);
  }
}

function switchView(view) {
  CURRENT_VIEW = view;
  document.querySelectorAll('.sb-item').forEach(el => el.classList.toggle('active', el.dataset.view === view));
  document.getElementById('page-title').textContent = VIEWS[view]?.title || view;
  document.getElementById('page').innerHTML = '';
  if (DATA) VIEWS[view]?.render();
}

function onFilterChange() {
  if (DATA) VIEWS[CURRENT_VIEW]?.render();
}

// ══════════════════════════════════════════════════════════════
// LOAD DATA
// ══════════════════════════════════════════════════════════════
async function loadData(force) {
  document.getElementById('loader').style.display = 'flex';
  document.getElementById('error-box').style.display = 'none';
  document.getElementById('app').style.display = 'none';

  try {
    const url = '/api/data' + (force ? '?t=' + Date.now() : '');
    const res = await fetch(url);
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error((err.error || res.statusText) + '\nTried: ' + url);
    }

    DATA = await res.json();

    // Apply enterprise meta (MUST be defined before using)
    applyEntMeta(DATA.enterpriseMeta || {});

    // Populate month filter
    const sel = document.getElementById('month-filter');
    sel.innerHTML = '<option value="all">All Months</option>';
    (DATA.months || []).forEach(m => {
      const opt = document.createElement('option');
      opt.value = m.key; opt.textContent = m.month;
      sel.appendChild(opt);
    });

    // Update footer
    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();

    document.getElementById('loader').style.display = 'none';
    document.getElementById('app').style.display = 'flex';

    VIEWS[CURRENT_VIEW]?.render();
  } catch (err) {
    console.error('[dashboard] loadData error:', err);
    document.getElementById('loader').style.display = 'none';
    const box = document.getElementById('error-box');
    box.style.display = 'block';
    document.getElementById('error-msg').textContent =
      err.message + '\n\nCheck Vercel env vars and function logs.';
  }
}

// ── Boot ──
loadData(false);
